<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Subtitle Generator</title>
  <style>
    body {
      font-family: sans-serif;
      background: #1e1e1e;
      color: #e6edf3;
      padding: 16px;
      margin: 0;
    }
    select, button {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }
    button {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #status {
      font-size: 12px;
      white-space: pre-wrap;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <select id="language">
    <option value="hi">Hindi</option>
    <option value="en">English</option>
  </select>
  <button id="generate">Generate Captions</button>
  <div id="status">Open a sequence, then click Generate Captions.</div>

  <script src="./CSInterface.js"></script>
  <script src="./index.js"></script>
</body>
</html>
